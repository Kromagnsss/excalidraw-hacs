<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Excalidraw</title>
  <link
    rel="stylesheet"
    href="https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/dev/index.css"
  />
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@19.0.0",
      "react/jsx-runtime": "https://esm.sh/react@19.0.0/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@19.0.0",
      "react-dom/client": "https://esm.sh/react-dom@19.0.0/client"
    }
  }
  </script>
  <style>
    html, body { margin: 0; padding: 0; }
    html, body, #app {
      height: 100vh;   /* repli si dvh non supporté */
      height: 100dvh;  /* tient compte de la barre d'adresse mobile */
    }
    #status {
      position: fixed; top: 8px; right: 12px; z-index: 999;
      font: 12px sans-serif; padding: 2px 8px; border-radius: 8px;
      background: #eee; color: #333; max-width: 60vw;
    }
    #status.connected { background: #d7f5d7; color: #145214; }
    #status.disconnected { background: #f5d7d7; color: #521414; }
  </style>
</head>
<body>
  <div id="status">connexion…</div>
  <div id="app"></div>

  <script>
    // --- Bloc 1 : connexion WebSocket, indépendante du chargement d'Excalidraw ---
    const statusEl = document.getElementById("status");
    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = cls || "";
    }

    // Champs d'appState liés à la caméra (position/zoom) : NE JAMAIS les
    // synchroniser entre appareils, sinon le dessin d'un PC peut se
    // retrouver hors-cadre sur un téléphone (viewport différent).
    const VIEWPORT_FIELDS = [
      "scrollX", "scrollY", "zoom", "width", "height",
      "offsetLeft", "offsetTop",
    ];

    function stripViewportFields(appState) {
      if (!appState) return appState;
      const clean = { ...appState };
      for (const key of VIEWPORT_FIELDS) delete clean[key];
      return clean;
    }

    const wsProtocol = location.protocol === "https:" ? "wss:" : "ws:";
    window.__excalidrawWS = new WebSocket(`${wsProtocol}//${location.host}/api/ha_excalidraw/ws`);
    window.__excalidrawLastRemote = null;

    window.__excalidrawWS.addEventListener("open", () => setStatus("connecté", "connected"));
    window.__excalidrawWS.addEventListener("close", () => setStatus("déconnecté", "disconnected"));
    window.__excalidrawWS.addEventListener("error", () => setStatus("erreur de connexion WebSocket", "disconnected"));
    window.__excalidrawWS.addEventListener("message", (event) => {
      const msg = JSON.parse(event.data);
      if (msg.payload) msg.payload.appState = stripViewportFields(msg.payload.appState);
      window.__excalidrawLastRemote = msg;
      if (window.__excalidrawApplyRemote) window.__excalidrawApplyRemote(msg);
    });

    // Force l'envoi du dernier état en attente quand on quitte/masque la page
    // (changement d'appli, verrouillage écran, fermeture d'onglet).
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden" && window.__excalidrawFlush) {
        window.__excalidrawFlush();
      }
    });
    window.addEventListener("pagehide", () => {
      if (window.__excalidrawFlush) window.__excalidrawFlush();
    });
  </script>

  <script type="module">
    try {
      const React = (await import("react")).default;
      const ReactDOM = (await import("react-dom/client")).default;
      const ExcalidrawLib = await import(
        "https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/dev/index.js?external=react,react-dom"
      );

      const root = ReactDOM.createRoot(document.getElementById("app"));
      let excalidrawAPI = null;
      // Au lieu d'un booléen remis à `false` immédiatement après updateScene
      // (peu fiable car onChange se déclenche de façon asynchrone/batchée par
      // React), on ignore explicitement le tout prochain onChange déclenché
      // par une mise à jour distante. Ça évite les boucles d'écho entre
      // clients qui bloquaient la collaboration après le premier trait.
      let skipNextOnChange = false;
      let sendTimer = null;
      let hasFittedOnce = false;
      let pendingScene = null;

      window.__excalidrawApplyRemote = (msg) => {
        if (!excalidrawAPI) return;
        if (msg.type !== "init" && msg.type !== "update") return;

        skipNextOnChange = true;
        excalidrawAPI.updateScene({
          elements: msg.payload.elements || [],
          appState: msg.payload.appState || {},
        });

        // Au premier chargement sur cet appareil, recentre la vue sur le
        // contenu reçu plutôt que d'utiliser la caméra de l'appareil émetteur.
        if (!hasFittedOnce && (msg.payload.elements || []).length > 0) {
          hasFittedOnce = true;
          excalidrawAPI.scrollToContent(msg.payload.elements, {
            fitToViewport: true,
            animate: false,
          });
        }
      };

      function buildPayload(elements, appState) {
        const { collaborators, ...safeAppState } = appState;
        return { elements, appState: stripViewportFields(safeAppState) };
      }

      function sendScene(elements, appState) {
        const ws = window.__excalidrawWS;
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ type: "update", payload: buildPayload(elements, appState) }));
      }

      window.__excalidrawFlush = () => {
        clearTimeout(sendTimer);
        if (pendingScene) {
          sendScene(pendingScene.elements, pendingScene.appState);
          pendingScene = null;
        }
      };

      function onChange(elements, appState) {
        if (skipNextOnChange) {
          skipNextOnChange = false;
          return;
        }
        pendingScene = { elements, appState };
        clearTimeout(sendTimer);
        sendTimer = setTimeout(window.__excalidrawFlush, 150);
      }

      root.render(
        React.createElement(ExcalidrawLib.Excalidraw, {
          excalidrawAPI: (api) => {
            excalidrawAPI = api;
            if (window.__excalidrawLastRemote) {
              window.__excalidrawApplyRemote(window.__excalidrawLastRemote);
            }
          },
          onChange,
          UIOptions: {
            canvasActions: {
              loadScene: false,
              export: { saveFileToDisk: true },
              toggleTheme: true,
            },
          },
        })
      );
    } catch (err) {
      console.error("Échec du chargement d'Excalidraw :", err);
      const appEl = document.getElementById("app");
      appEl.innerHTML =
        "<pre style='padding:16px;color:#521414;white-space:pre-wrap;font:13px monospace;'>" +
        "Échec du chargement du canvas Excalidraw depuis le CDN.\n\n" +
        String(err && err.stack ? err.stack : err) +
        "</pre>";
    }
  </script>
</body>
</html>
