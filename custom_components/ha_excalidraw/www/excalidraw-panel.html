<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Excalidraw</title>
  <link
    rel="stylesheet"
    href="https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/dev/index.css"
  />
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@19.0.0",
      "react/jsx-runtime": "https://esm.sh/react@19.0.0/jsx-runtime",
      "react-dom": "https://esm.sh/react-dom@19.0.0",
      "react-dom/client": "https://esm.sh/react-dom@19.0.0/client"
    }
  }
  </script>
  <style>
    html, body { margin: 0; padding: 0; }
    html, body, #app {
      height: 100vh;
      height: 100dvh;
    }
    #status {
      position: fixed; top: 8px; right: 12px; z-index: 999;
      font: 12px sans-serif; padding: 2px 8px; border-radius: 8px;
      background: #eee; color: #333; max-width: 60vw;
    }
    #status.connected { background: #d7f5d7; color: #145214; }
    #status.disconnected { background: #f5d7d7; color: #521414; }
  </style>
</head>
<body>
  <div id="status">connexion…</div>
  <div id="app"></div>

  <script>
    // --- Bloc 1 : connexion WebSocket + promesse des données initiales ---
    const statusEl = document.getElementById("status");
    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = cls || "";
    }

    const VIEWPORT_FIELDS = [
      "scrollX", "scrollY", "zoom", "width", "height",
      "offsetLeft", "offsetTop",
    ];
    function stripViewportFields(appState) {
      if (!appState) return appState;
      const clean = { ...appState };
      for (const key of VIEWPORT_FIELDS) delete clean[key];
      return clean;
    }

    // La promesse que le composant Excalidraw attend avant de terminer son
    // propre montage : tant qu'elle n'est pas résolue, Excalidraw n'affiche
    // pas de scène vide qui pourrait déclencher un onChange parasite.
    let _resolveInitialData;
    window.__initialDataPromise = new Promise((resolve) => {
      _resolveInitialData = resolve;
    });
    let _initialDataResolved = false;

    const wsProtocol = location.protocol === "https:" ? "wss:" : "ws:";
    window.__excalidrawWS = new WebSocket(`${wsProtocol}//${location.host}/api/ha_excalidraw/ws`);

    window.__excalidrawWS.addEventListener("open", () => setStatus("connecté", "connected"));
    window.__excalidrawWS.addEventListener("close", () => setStatus("déconnecté", "disconnected"));
    window.__excalidrawWS.addEventListener("error", () => setStatus("erreur de connexion WebSocket", "disconnected"));
    window.__excalidrawWS.addEventListener("message", (event) => {
      const msg = JSON.parse(event.data);
      if (msg.payload) msg.payload.appState = stripViewportFields(msg.payload.appState);

      if (msg.type === "init" && !_initialDataResolved) {
        _initialDataResolved = true;
        _resolveInitialData({
          elements: msg.payload.elements || [],
          appState: msg.payload.appState || {},
        });
        return;
      }

      // Mise à jour reçue après le chargement initial (collab en direct).
      if (window.__excalidrawApplyRemote) window.__excalidrawApplyRemote(msg);
    });
  </script>

  <script type="module">
    try {
      const React = (await import("react")).default;
      const ReactDOM = (await import("react-dom/client")).default;
      const ExcalidrawLib = await import(
        "https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/dev/index.js?external=react,react-dom"
      );

      const root = ReactDOM.createRoot(document.getElementById("app"));
      let excalidrawAPI = null;
      let skipNextOnChange = false;
      let hasFittedOnce = false;

      window.__excalidrawApplyRemote = (msg) => {
        if (!excalidrawAPI) return;
        if (msg.type !== "update") return;

        skipNextOnChange = true;
        excalidrawAPI.updateScene({
          elements: msg.payload.elements || [],
          appState: msg.payload.appState || {},
        });
      };

      function stripViewportFields(appState) {
        const clean = { ...appState };
        for (const key of ["scrollX", "scrollY", "zoom", "width", "height", "offsetLeft", "offsetTop"]) {
          delete clean[key];
        }
        return clean;
      }

      function sendScene(elements, appState) {
        const ws = window.__excalidrawWS;
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const { collaborators, ...safeAppState } = appState;
        ws.send(JSON.stringify({
          type: "update",
          payload: { elements, appState: stripViewportFields(safeAppState) },
        }));
      }

      function onChange(elements, appState) {
        if (skipNextOnChange) {
          skipNextOnChange = false;
          return;
        }
        sendScene(elements, appState);
      }

      root.render(
        React.createElement(ExcalidrawLib.Excalidraw, {
          excalidrawAPI: (api) => {
            excalidrawAPI = api;
          },
          initialData: window.__initialDataPromise,
          onChange,
          UIOptions: {
            canvasActions: {
              loadScene: false,
              export: { saveFileToDisk: true },
              toggleTheme: true,
            },
          },
        })
      );

      // Une fois les données initiales appliquées par Excalidraw lui-même,
      // recentre la vue sur le contenu (caméra propre à cet appareil).
      window.__initialDataPromise.then((data) => {
        if ((data.elements || []).length > 0 && excalidrawAPI && !hasFittedOnce) {
          hasFittedOnce = true;
          // Laisse Excalidraw terminer son rendu avant de recentrer.
          requestAnimationFrame(() => {
            excalidrawAPI.scrollToContent(data.elements, { fitToViewport: true, animate: false });
          });
        }
      });
    } catch (err) {
      console.error("Échec du chargement d'Excalidraw :", err);
      const appEl = document.getElementById("app");
      appEl.innerHTML =
        "<pre style='padding:16px;color:#521414;white-space:pre-wrap;font:13px monospace;'>" +
        "Échec du chargement du canvas Excalidraw depuis le CDN.\n\n" +
        String(err && err.stack ? err.stack : err) +
        "</pre>";
    }
  </script>
</body>
</html>
